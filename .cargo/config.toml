
[target.x86_64-unknown-none]
rustflags = [
    "-C",
    "force-frame-pointers",
    "-C",
    "link-arg=-Tmisc/linker_x86_64.ld",
    "-C",
    "link-arg=--gc-sections",
    "-C",
    "codegen-units=1",
]

[target.aarch64-unknown-none-softfloat]
rustflags = [
    "-C",
    "force-frame-pointers",
    "-C",
    "link-arg=-Tmisc/linker_aarch64.ld",
    "-C",
    "link-arg=--gc-sections",
    "-C",
    "codegen-units=1",
]

[target.riscv64imac-unknown-none-elf]
rustflags = [
    "-C",
    "force-frame-pointers",
    "-C",
    "link-arg=-Tmisc/linker_riscv64.ld",
    "-C",
    "link-arg=--gc-sections",
    "-C",
    "codegen-units=1",
]

[unstable]
build-std = ["core"]
